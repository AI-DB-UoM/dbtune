name: no-chinese-check

on:
  push:
    branches:
      - main
      - "release/**"
      - "feature/**"
  pull_request:

jobs:
  no-chinese:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set diff range
        id: diff
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check changed files for Chinese characters
        run: python scripts/check_no_chinese.py "${{ steps.diff.outputs.base }}" "${{ steps.diff.outputs.head }}"

