name: ci

on:
  push:
    branches:
      - main
      - "release/**"
      - "feature/**"
  pull_request:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.diff.outputs.base }}
      head: ${{ steps.diff.outputs.head }}
    steps:
      - name: Set diff range
        id: diff
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

  no-chinese:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Block Chinese characters in all tracked files
        run: python scripts/check_no_chinese.py --all

  python-quality:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r dbtune_mab_service/requirements.txt
          pip install black ruff pytest

      - name: Python syntax check
        run: python -m compileall dbtune_mab_service colse_service test scripts

      - name: Python format and lint on changed files
        env:
          BASE: ${{ needs.prepare.outputs.base }}
          HEAD: ${{ needs.prepare.outputs.head }}
        run: |
          set -euo pipefail
          if [[ -n "$BASE" && "${BASE//0/}" == "" ]]; then
            git diff-tree --no-commit-id --name-only -z -r "$HEAD" > /tmp/changed.z
          else
            git diff --name-only -z "$BASE" "$HEAD" > /tmp/changed.z
          fi

          py_files=()
          while IFS= read -r -d '' file; do
            [[ "$file" == *.py ]] && py_files+=("$file")
          done < /tmp/changed.z

          if (( ${#py_files[@]} > 0 )); then
            black --check "${py_files[@]}"
            ruff check "${py_files[@]}"
          else
            echo "No changed Python files."
          fi

      - name: Run tests
        run: pytest -q

  c-extension:
    needs: prepare
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install C/PostgreSQL build dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y build-essential clang-format libcurl4-openssl-dev

          # Prefer a concrete PostgreSQL server dev package to avoid
          # postgresql-common version conflicts on ubuntu-latest runners.
          DEV_PKG="$(apt-cache search '^postgresql-server-dev-[0-9]+$' | awk '{print $1}' | sort -V | tail -1)"
          if [[ -n "${DEV_PKG}" ]]; then
            echo "Installing PostgreSQL dev package: ${DEV_PKG}"
            sudo apt-get install -y "${DEV_PKG}"
          elif apt-cache show postgresql-server-dev-all >/dev/null 2>&1; then
            echo "Falling back to postgresql-server-dev-all"
            sudo apt-get install -y postgresql-server-dev-all
          else
            echo "No PostgreSQL server development package found" >&2
            exit 1
          fi

          # PGXS from some PostgreSQL packages expects /usr/bin/clang-19 for
          # LLVM bitcode generation. Ensure it exists on GitHub runners.
          if ! command -v clang >/dev/null 2>&1; then
            sudo apt-get install -y clang
          fi
          if ! command -v clang-19 >/dev/null 2>&1; then
            if apt-cache show clang-19 >/dev/null 2>&1; then
              sudo apt-get install -y clang-19
            else
              sudo ln -sf "$(command -v clang)" /usr/bin/clang-19
            fi
          fi

      - name: C format check on changed files
        env:
          BASE: ${{ needs.prepare.outputs.base }}
          HEAD: ${{ needs.prepare.outputs.head }}
        run: |
          set -euo pipefail
          if [[ -n "$BASE" && "${BASE//0/}" == "" ]]; then
            git diff-tree --no-commit-id --name-only -z -r "$HEAD" > /tmp/changed.z
          else
            git diff --name-only -z "$BASE" "$HEAD" > /tmp/changed.z
          fi

          c_files=()
          while IFS= read -r -d '' file; do
            if [[ "$file" == *.c || "$file" == *.h ]]; then
              c_files+=("$file")
            fi
          done < /tmp/changed.z

          if (( ${#c_files[@]} > 0 )); then
            clang-format --dry-run --Werror "${c_files[@]}"
          else
            echo "No changed C/C header files."
          fi

      - name: Build PostgreSQL extensions (PGXS)
        run: |
          set -euo pipefail
          which pg_config
          pg_config --version
          make -C dbtune_pg_mab_extension clean all PG_CONFIG="$(which pg_config)"
          make -C dbtune_pg_colse_extension clean all PG_CONFIG="$(which pg_config)"

      - name: Build postgres image with extensions
        run: docker build -t dbtune-pg-ext-ci -f docker/postgres-with-extensions.Dockerfile .

      - name: Verify extensions can be created in PostgreSQL
        run: |
          set -euo pipefail
          docker rm -f dbtune-pg-ci >/dev/null 2>&1 || true
          docker run -d --name dbtune-pg-ci \
            -e POSTGRES_USER=pguser \
            -e POSTGRES_PASSWORD=123456 \
            -e POSTGRES_DB=pgdb \
            -p 55432:5432 \
            dbtune-pg-ext-ci

          ready=0
          for _ in {1..60}; do
            if docker exec dbtune-pg-ci pg_isready -U pguser -d pgdb >/dev/null 2>&1; then
              ready=1
              break
            fi
            if [[ "$(docker inspect -f '{{.State.Running}}' dbtune-pg-ci 2>/dev/null || echo false)" != "true" ]]; then
              echo "PostgreSQL container exited before readiness." >&2
              docker logs dbtune-pg-ci || true
              exit 1
            fi
            sleep 2
          done
          if [[ "$ready" -ne 1 ]]; then
            echo "PostgreSQL readiness timed out." >&2
            docker logs dbtune-pg-ci || true
            exit 1
          fi

          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "CREATE EXTENSION IF NOT EXISTS dbtune_mab;"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "CREATE EXTENSION IF NOT EXISTS dbtune_colse;"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "SELECT extname FROM pg_extension WHERE extname = 'dbtune_mab';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "SELECT extname FROM pg_extension WHERE extname = 'dbtune_colse';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "ALTER SYSTEM SET dbtune_mab_tuning = 'on';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "ALTER SYSTEM SET dbtune_colse_enabled = 'on';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "ALTER SYSTEM SET dbtune_mab_service_url = 'http://127.0.0.1:5050/mab/';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "ALTER SYSTEM SET dbtune_colse_service_url = 'http://127.0.0.1:5060/colse/estimate';"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "SELECT pg_reload_conf();"
          docker exec -e PGPASSWORD=123456 dbtune-pg-ci \
            psql -U pguser -d pgdb -v ON_ERROR_STOP=1 \
            -c "SELECT dbtune_colse_estimate('select 1 as a');"

      - name: Cleanup
        if: always()
        run: docker rm -f dbtune-pg-ci >/dev/null 2>&1 || true
